<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Talha Faisal</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Encodes the path into the query string so the main index.html can restore it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
